name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:  # Allow this workflow to be called by other workflows

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'billingonaire_backend/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/cd.yml'
            frontend:
              - 'billingonaire-ui/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/cd.yml'

  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd billingonaire_backend
          pip install flake8==6.1.0 black==23.12.1 isort==5.13.2 mypy==1.7.1 types-requests

      - name: Run Black
        run: |
          cd billingonaire_backend
          black --check .

      - name: Run isort
        run: |
          cd billingonaire_backend
          isort --check-only .

      - name: Run flake8
        run: |
          cd billingonaire_backend
          flake8 . --config=.flake8 --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run mypy
        run: |
          cd billingonaire_backend
          mypy --config-file mypy.ini CourtScraper.py

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [changes, backend-lint]
    if: needs.changes.outputs.backend == 'true'


    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('billingonaire_backend/requirements.txt', 'billingonaire_backend/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd billingonaire_backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        env:
          TESTING: true
        run: |
          cd billingonaire_backend
          pytest tests/unit -v --cov=. --cov-report=xml --cov-report=term

      - name: Run BDD specification tests
        env:
          TESTING: true
        run: |
          cd billingonaire_backend
          pytest specs/ -v --tb=short --cov=. --cov-append --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./billingonaire_backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json

      - name: Install dependencies (dev only for linting)
        run: |
          cd billingonaire-ui
          npm ci --prefer-offline --only=dev

      - name: Run ESLint (only src/)
        run: |
          cd billingonaire-ui
          npm run lint -- src --max-warnings=6

  frontend-unit-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, frontend-lint]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci --prefer-offline

      - name: Run Vitest unit tests (fast)
        run: |
          cd billingonaire-ui
          npm run test:unit:fast

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./billingonaire-ui/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  frontend-e2e-test:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, frontend-lint]
    if: needs.changes.outputs.frontend == 'true' && github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('billingonaire-ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Playwright (Chromium only)
        run: |
          cd billingonaire-ui
          npx playwright install chromium

      - name: Run Playwright e2e tests (Chrome only)
        continue-on-error: true  # Skip e2e tests if they fail - require Firebase emulator setup
        run: |
          cd billingonaire-ui
          npm run test:e2e:fast

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' && github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk Security Scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
