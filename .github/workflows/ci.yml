name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd billingonaire-backend
          pip install flake8 black isort mypy
      
      - name: Run Black
        run: |
          cd billingonaire-backend
          black --check .
      
      - name: Run isort
        run: |
          cd billingonaire-backend
          isort --check-only .
      
      - name: Run flake8
        run: |
          cd billingonaire-backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    
    services:
      firestore-emulator:
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:latest
        ports:
          - 8080:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('billingonaire-backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          cd billingonaire-backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock httpx
      
      - name: Start Firestore Emulator
        run: |
          gcloud emulators firestore start --host-port=localhost:8080 &
          sleep 5
      
      - name: Run unit tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          TESTING: true
        run: |
          cd billingonaire-backend
          pytest tests/unit -v --cov=. --cov-report=xml --cov-report=term
      
      - name: Run integration tests
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          TESTING: true
        run: |
          cd billingonaire-backend
          pytest tests/integration -v --cov=. --cov-append --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./billingonaire-backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json
      
      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci
      
      - name: Run ESLint
        run: |
          cd billingonaire-ui
          npm run lint -- --max-warnings=0

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json
      
      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci
      
      - name: Run Vitest unit tests
        run: |
          cd billingonaire-ui
          npm run test:unit
      
      - name: Run Playwright e2e tests
        run: |
          cd billingonaire-ui
          npx playwright install --with-deps
          npm run test:e2e
      
      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./billingonaire-ui/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
