name: CD Pipeline - Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  GCP_PROJECT_ID: 'billingonaire'
  GCP_REGION: 'asia-south1'
  CLOUD_RUN_SERVICE: 'billingonaire-backend'

jobs:
  test:
    name: Run All Tests
    uses: ./.github/workflows/ci.yml
  
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and activate Python virtual environment
        run: |
          cd billingonaire-backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Submit to Cloud Build
        run: |
          cd billingonaire-backend
          source venv/bin/activate
          echo "Starting Cloud Build..."
          # Submit build and capture the build ID
          BUILD_OUTPUT=$(gcloud builds submit \
            --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:latest \
            --format="value(id)" 2>&1 || echo "BUILD_FAILED")
          # Check if build submission failed
          if [[ "$BUILD_OUTPUT" == *"BUILD_FAILED"* ]] || [[ -z "$BUILD_OUTPUT" ]]; then
            echo "ERROR: Failed to submit build to Cloud Build"
            echo "Output: $BUILD_OUTPUT"
            exit 1
          fi
          
          # Extract build ID (last line of output)
          BUILD_ID=$(echo "$BUILD_OUTPUT" | tail -1)
          echo "Build ID: $BUILD_ID"
          
          # Wait for build to complete and check status
          echo "Waiting for build to complete..."
          gcloud builds describe $BUILD_ID --format="value(status)" > /tmp/build_status.txt
          BUILD_STATUS=$(cat /tmp/build_status.txt)
          
          # Wait loop (max 10 minutes)
          TIMEOUT=600
          ELAPSED=0
          while [[ "$BUILD_STATUS" == "WORKING" || "$BUILD_STATUS" == "QUEUED" ]]; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Build timeout after 10 minutes"
              exit 1
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            gcloud builds describe $BUILD_ID --format="value(status)" > /tmp/build_status.txt
            BUILD_STATUS=$(cat /tmp/build_status.txt)
            echo "Build status: $BUILD_STATUS (${ELAPSED}s elapsed)"
          done
          
          # Check final status
          if [ "$BUILD_STATUS" != "SUCCESS" ]; then
            echo "ERROR: Build failed with status: $BUILD_STATUS"
            echo "Fetching build logs..."
            gcloud builds log $BUILD_ID --limit=50
            exit 1
          fi
          
          echo "Build completed successfully!"
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600s \
            --max-instances 10 \
            --min-instances 1 \
            --set-env-vars "ORDER_PROCESSING_WORKERS=3,ORDER_MAX_SEQUENCE_RETRIES=50" \
            --set-secrets "GCLOUD_SERVICE_ACCOUNT_KEY=GCLOUD_SERVICE_ACCOUNT_KEY:latest"
      
      - name: Verify Deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "Backend deployed to: $SERVICE_URL"
          curl -f "$SERVICE_URL/" || exit 1

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json
      
      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci
      
      - name: Build production bundle
        run: |
          cd billingonaire-ui
          npm run build
        env:
          NODE_ENV: production
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT_ID }}
      
      - name: Verify Frontend Deployment
        run: |
          sleep 10
          curl -f https://billingonaire.web.app/ || exit 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(git log --oneline --pretty=format:"- %s" HEAD~10..HEAD)
          else
            NOTES=$(git log --oneline --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes
            ${{ steps.release_notes.outputs.notes }}
            
            ## Deployments
            - Backend: https://billingonaire-backend-819125105651.asia-south1.run.app
            - Frontend: https://billingonaire.web.app
          draft: false
          prerelease: false
