name: CD Pipeline - Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  GCP_PROJECT_ID: 'billingonaire'
  GCP_REGION: 'asia-south1'
  CLOUD_RUN_SERVICE: 'billingonaire-backend'

jobs:
  test:
    name: Run All Tests
    uses: ./.github/workflows/ci.yml
  
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker
          
      - name: Set project configuration
        run: |
          gcloud config set project ${{ env.GCP_PROJECT_ID }}
          gcloud config list

      - name: Enable Required APIs
        run: |
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable run.googleapis.com
          gcloud services enable secretmanager.googleapis.com
      
      - name: Setup Firebase Service Account Secret
        run: |
          echo "🔐 Setting up Firebase service account secret..."
          
          # Check if secret exists, create if not
          if ! gcloud secrets describe GCLOUD_SERVICE_ACCOUNT_KEY >/dev/null 2>&1; then
            echo "Creating GCLOUD_SERVICE_ACCOUNT_KEY secret..."
            echo '${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}' | gcloud secrets create GCLOUD_SERVICE_ACCOUNT_KEY --data-file=-
          else
            echo "Updating GCLOUD_SERVICE_ACCOUNT_KEY secret..."
            echo '${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}' | gcloud secrets versions add GCLOUD_SERVICE_ACCOUNT_KEY --data-file=-
          fi
          
          # Grant the Cloud Run service account access to the secret
          gcloud secrets add-iam-policy-binding GCLOUD_SERVICE_ACCOUNT_KEY \
            --member="serviceAccount:firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor"
      
      - name: Verify Service Account Permissions
        run: |
          echo "🔍 Verifying service account permissions..."
          
          # Check if service account exists
          if gcloud iam service-accounts describe firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com >/dev/null 2>&1; then
            echo "✅ Service account exists"
          else
            echo "❌ Service account not found"
            exit 1
          fi
          
          # List current IAM roles for the service account
          echo "📋 Current IAM roles for service account:"
          gcloud projects get-iam-policy ${{ env.GCP_PROJECT_ID }} \
            --flatten="bindings[].members" \
            --format="table(bindings.role)" \
            --filter="bindings.members:firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com"
      
      - name: Build and Deploy with Cloud Build (matching Firebase script)
        run: |
          echo "🚀 Building and deploying backend to Google Cloud Run..."
          
          # Verify we have the Dockerfile
          if [ ! -f billingonaire_backend/Dockerfile ]; then
            echo "❌ Error: Dockerfile not found in billingonaire_backend/"
            exit 1
          fi
          
          # Check current directory and list contents
          echo "📂 Current directory: $(pwd)"
          echo "📂 Backend directory contents:"
          ls -la billingonaire_backend/
          
          cd billingonaire_backend
          
          # Build container image using Cloud Build (same as Firebase script)
          echo "🔨 Building Docker image..."
          gcloud builds submit --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }} .
          
          echo "🚀 Deploying to Cloud Run..."
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=540s \
            --max-instances=10 \
            --min-instances=1 \
            --service-account=firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com \
            --set-env-vars="ORDER_PROCESSING_WORKERS=3,ORDER_MAX_SEQUENCE_RETRIES=50,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }}" \
            --update-secrets="GCLOUD_SERVICE_ACCOUNT_KEY=GCLOUD_SERVICE_ACCOUNT_KEY:latest"
      
      - name: Verify Deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "✅ Backend deployed to: $SERVICE_URL"
          # Wait a moment for deployment to be ready
          sleep 10
          curl -f "$SERVICE_URL/" || exit 1

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json
      
      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci
      
      - name: Build production bundle
        run: |
          cd billingonaire-ui
          npm run build
        env:
          NODE_ENV: production
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT_ID }}
      
      - name: Verify Frontend Deployment
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          sleep 15
          curl -f https://billingonaire.web.app/ || echo "⚠️ Frontend verification failed, but deployment may still be processing"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main' && success()
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(git log --oneline --pretty=format:"- %s" HEAD~10..HEAD)
          else
            NOTES=$(git log --oneline --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes
            ${{ steps.release_notes.outputs.notes }}
            
            ## Deployments
            - Backend: https://billingonaire-backend-819125105651.asia-south1.run.app
            - Frontend: https://billingonaire.web.app
            
            ## Deployment Status
            ✅ Backend deployed to Cloud Run
            ✅ Frontend deployed to Firebase Hosting
          draft: false
          prerelease: false
