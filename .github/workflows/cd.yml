name: CD Pipeline - Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'billingonaire_backend/**'
      - 'billingonaire-ui/**'
      - 'firebase/**'
      - '.github/workflows/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  GCP_PROJECT_ID: 'billingonaire'
  GCP_REGION: 'asia-south1'
  CLOUD_RUN_SERVICE: 'billingonaire-backend'
  # CI/CD deployer service account (authenticates via WIF)
  GCP_DEPLOY_SA: 'github-actions-deploy@billingonaire.iam.gserviceaccount.com'
  # Runtime service account the Cloud Run service runs as
  CLOUD_RUN_RUNTIME_SA: 'firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com'

jobs:
  test:
    name: Run All Tests
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: read

  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
      firestore_changed: ${{ steps.changes.outputs.firestore_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          BACKEND_CHANGED=false
          FRONTEND_CHANGED=false
          FIRESTORE_CHANGED=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "⚡ Manual dispatch: marking all components as changed"
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            FIRESTORE_CHANGED=true
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            echo "📂 Changed files:"
            echo "$CHANGED_FILES"
            while IFS= read -r file; do
              case "$file" in
                billingonaire_backend/*) BACKEND_CHANGED=true ;;
                billingonaire-ui/*) FRONTEND_CHANGED=true ;;
                firestore.indexes.json|firestore.rules|firebase.json) FIRESTORE_CHANGED=true ;;
                firebase/*|.github/workflows/*|package.json)
                  BACKEND_CHANGED=true
                  FRONTEND_CHANGED=true
                  FIRESTORE_CHANGED=true
                  ;;
              esac
            done <<< "$CHANGED_FILES"
          else
            echo "⚡ No previous commit: marking all components as changed"
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            FIRESTORE_CHANGED=true
          fi

          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_changed=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "firestore_changed=$FIRESTORE_CHANGED" >> $GITHUB_OUTPUT

          echo "📊 Change detection results:"
          echo "  Backend changed: $BACKEND_CHANGED"
          echo "  Frontend changed: $FRONTEND_CHANGED"
          echo "  Firestore changed: $FIRESTORE_CHANGED"

  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.backend_changed == 'true'
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SA }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and Deploy to Cloud Run
        run: |
          echo "🚀 Building and deploying backend to Google Cloud Run..."

          cd billingonaire_backend

          echo "🔨 Submitting build with tag: ${{ github.sha }}"
          BUILD_ID=$(gcloud builds submit \
            --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --async \
            --format='value(id)' \
            .)
          echo "Build ID: $BUILD_ID"

          echo "⏳ Polling build status..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
            echo "  Status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "✅ Build succeeded"; break ;;
              FAILURE|CANCELLED|TIMEOUT|EXPIRED)
                echo "❌ Build failed: $STATUS"
                echo "Logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=${{ env.GCP_PROJECT_ID }}"
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done

          echo "🚀 Deploying to Cloud Run..."

          BACKEND_ENV_VARS="ORDER_PROCESSING_WORKERS=3,ORDER_MAX_SEQUENCE_RETRIES=50,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }},COURT_SCRAPER_PROVIDER=direct_api,ORDER_PDF_BUCKET=billingonaire-court-orders"

          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=540s \
            --max-instances=10 \
            --min-instances=1 \
            --cpu-boost \
            --service-account=${{ env.CLOUD_RUN_RUNTIME_SA }} \
            --set-env-vars="$BACKEND_ENV_VARS"

      - name: Verify Deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "✅ Backend deployed to: $SERVICE_URL"
          sleep 10
          curl -f "$SERVICE_URL/" || exit 1

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.frontend_changed == 'true'
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SA }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci

      - name: Build production bundle
        run: |
          cd billingonaire-ui
          npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://billingonaire-backend-819125105651.asia-south1.run.app

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project ${{ env.GCP_PROJECT_ID }}

      - name: Verify Frontend Deployment
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          sleep 15
          curl -f https://billingonaire.web.app/ || echo "⚠️ Frontend verification failed, but deployment may still be processing"

  deploy-firestore:
    name: Deploy Firestore Indexes
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.firestore_changed == 'true'
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SA }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore indexes and rules
        run: |
          echo "🔥 Deploying Firestore configuration..."
          firebase deploy --only firestore --project ${{ env.GCP_PROJECT_ID }}
          echo "✅ Firestore deployed successfully"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-firestore]
    if: github.ref == 'refs/heads/main' && !failure() && !cancelled()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(git log --oneline --pretty=format:"- %s" HEAD~10..HEAD)
          else
            NOTES=$(git log --oneline --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes
            ${{ steps.release_notes.outputs.notes }}

            ## Deployments
            - Backend: https://billingonaire-backend-819125105651.asia-south1.run.app
            - Frontend: https://billingonaire.web.app

            ## Deployment Status
            ✅ Backend deployed to Cloud Run
            ✅ Frontend deployed to Firebase Hosting
          draft: false
          prerelease: false
