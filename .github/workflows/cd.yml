name: CD Pipeline - Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'billingonaire_backend/**'
      - 'billingonaire-ui/**'
      - 'firebase/**'
      - '.github/workflows/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  GCP_PROJECT_ID: 'billingonaire'
  GCP_REGION: 'asia-south1'
  CLOUD_RUN_SERVICE: 'billingonaire-backend'

jobs:
  test:
    name: Run All Tests
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: read

  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
      firestore_changed: ${{ steps.changes.outputs.firestore_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          BACKEND_CHANGED=false
          FRONTEND_CHANGED=false
          FIRESTORE_CHANGED=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "⚡ Manual dispatch: marking all components as changed"
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            FIRESTORE_CHANGED=true
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            echo "📂 Changed files:"
            echo "$CHANGED_FILES"
            while IFS= read -r file; do
              case "$file" in
                billingonaire_backend/*) BACKEND_CHANGED=true ;;
                billingonaire-ui/*) FRONTEND_CHANGED=true ;;
                firestore.indexes.json|firestore.rules|firebase.json) FIRESTORE_CHANGED=true ;;
                firebase/*|.github/workflows/*|package.json)
                  BACKEND_CHANGED=true
                  FRONTEND_CHANGED=true
                  FIRESTORE_CHANGED=true
                  ;;
              esac
            done <<< "$CHANGED_FILES"
          else
            echo "⚡ No previous commit: marking all components as changed"
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            FIRESTORE_CHANGED=true
          fi

          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_changed=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "firestore_changed=$FIRESTORE_CHANGED" >> $GITHUB_OUTPUT

          echo "📊 Change detection results:"
          echo "  Backend changed: $BACKEND_CHANGED"
          echo "  Frontend changed: $FRONTEND_CHANGED"
          echo "  Firestore changed: $FIRESTORE_CHANGED"

  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.backend_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Validate Service Account Secret Format
        env:
          SA_KEY: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}
        run: |
          python3 - <<'EOF'
          import os, sys, json

          sa_key = os.environ.get('SA_KEY', '').strip()

          # Check if secret exists
          if not sa_key:
              print('❌ ERROR: GCLOUD_SERVICE_ACCOUNT_KEY secret is empty or not set')
              sys.exit(1)

          # Check if it starts with HTML
          if sa_key.startswith('<!') or sa_key.startswith('<html'):
              print('❌ ERROR: Secret contains HTML instead of JSON')
              print('   The secret appears to be an HTML page (starts with "<!doctype" or "<html>")')
              print('   Please re-create the secret with the actual JSON service account key')
              sys.exit(2)

          # Check if it starts with JSON
          if not sa_key.startswith('{'):
              print('❌ ERROR: Secret does not start with "{" - not valid JSON format')
              print('   First 50 chars:', sa_key[:50] if len(sa_key) > 50 else sa_key)
              print('   Hint: If base64-encoded, decode it first or use credentials_file instead')
              sys.exit(3)

          # Try parsing as JSON
          try:
              parsed = json.loads(sa_key)
          except json.JSONDecodeError as e:
              print(f'❌ ERROR: Secret is not valid JSON: {e}')
              sys.exit(4)

          # Verify it's a service account key
          if parsed.get('type') != 'service_account':
              print('❌ ERROR: JSON parsed but "type" field is not "service_account"')
              print(f'   Found type: {parsed.get("type")}')
              sys.exit(5)

          # Check required fields
          required_fields = ['project_id', 'private_key_id', 'private_key', 'client_email']
          missing = [f for f in required_fields if f not in parsed]
          if missing:
              print(f'❌ ERROR: Service account JSON missing required fields: {missing}')
              sys.exit(6)

          print('✅ Service account secret format is valid')
          print(f'   Project: {parsed.get("project_id")}')
          print(f'   Email: {parsed.get("client_email")}')
          EOF

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Set project configuration
        run: |
          gcloud config set project ${{ env.GCP_PROJECT_ID }}
          gcloud config list

      - name: Enable Required APIs
        run: |
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable run.googleapis.com

      - name: Verify Service Account Permissions
        run: |
          echo "🔍 Verifying service account permissions..."

          # Check if service account exists
          if gcloud iam service-accounts describe firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com >/dev/null 2>&1; then
            echo "✅ Service account exists"
          else
            echo "❌ Service account not found"
            exit 1
          fi

          # List current IAM roles for the service account
          echo "📋 Current IAM roles for service account:"
          gcloud projects get-iam-policy ${{ env.GCP_PROJECT_ID }} \
            --flatten="bindings[].members" \
            --format="table(bindings.role)" \
            --filter="bindings.members:firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com"

          echo "ℹ️  Backend will use Application Default Credentials (ADC) via service account"

      - name: Build and Deploy to Cloud Run
        run: |
          echo "🚀 Building and deploying backend to Google Cloud Run..."

          cd billingonaire_backend

          # Build container image using Cloud Build with commit SHA tag
          # This prevents reusing stale 'latest' images and ensures fresh builds
          echo "🔨 Building Docker image with tag: ${{ github.sha }}"
          gcloud builds submit --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} .

          echo "🚀 Deploying to Cloud Run..."

          BACKEND_ENV_VARS="ORDER_PROCESSING_WORKERS=3,ORDER_MAX_SEQUENCE_RETRIES=50,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }},COURT_SCRAPER_PROVIDER=direct_api"

          # Deploy with Application Default Credentials (service account)
          # Using commit SHA tag ensures we deploy exactly what was built
          # --cpu-boost ensures full CPU during cold start so heavy Python/ML
          # imports (spaCy, pandas, scikit-learn) complete before the startup probe times out
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=540s \
            --max-instances=10 \
            --min-instances=1 \
            --cpu-boost \
            --service-account=firebase-adminsdk-t0k85@billingonaire.iam.gserviceaccount.com \
            --set-env-vars="$BACKEND_ENV_VARS"

      - name: Verify Deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "✅ Backend deployed to: $SERVICE_URL"
          # Wait a moment for deployment to be ready
          sleep 10
          curl -f "$SERVICE_URL/" || exit 1

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.frontend_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: billingonaire-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd billingonaire-ui
          npm ci

      - name: Build production bundle
        run: |
          cd billingonaire-ui
          npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://billingonaire-backend-819125105651.asia-south1.run.app

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT_ID }}

      - name: Verify Frontend Deployment
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          sleep 15
          curl -f https://billingonaire.web.app/ || echo "⚠️ Frontend verification failed, but deployment may still be processing"

  deploy-firestore:
    name: Deploy Firestore Indexes
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.firestore_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}'
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ env.GCP_PROJECT_ID }}'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify Firestore Index Admin permissions
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ] || [ ! -f "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "❌ ERROR: GOOGLE_APPLICATION_CREDENTIALS not set or file not found"
            exit 1
          fi
          SA_EMAIL=$(python3 -c "import json,sys; data=json.load(open('$GOOGLE_APPLICATION_CREDENTIALS')); print(data['client_email'])" 2>&1) || {
            echo "❌ ERROR: Failed to read service account email from credentials file: ${SA_EMAIL}"
            exit 1
          }
          echo "🔍 Checking IAM roles for: ${SA_EMAIL}"
          POLICY=$(gcloud projects get-iam-policy ${{ env.GCP_PROJECT_ID }} \
            --flatten="bindings[].members" \
            --format="table(bindings.role)" \
            --filter="bindings.members:${SA_EMAIL}")
          echo "📋 Current roles for ${SA_EMAIL}:"
          echo "$POLICY"
          if ! echo "$POLICY" | grep -q "roles/datastore.indexAdmin"; then
            echo ""
            echo "❌ ERROR: Service account '${SA_EMAIL}' is missing roles/datastore.indexAdmin"
            echo "   This role is required to create and manage Firestore composite indexes."
            echo ""
            echo "   To fix this, run the following command once:"
            echo "   gcloud projects add-iam-policy-binding ${{ env.GCP_PROJECT_ID }} \\"
            echo "     --member='serviceAccount:${SA_EMAIL}' \\"
            echo "     --role='roles/datastore.indexAdmin'"
            echo ""
            echo "   Or grant it via the GCP Console:"
            echo "   https://console.cloud.google.com/iam-admin/iam?project=${{ env.GCP_PROJECT_ID }}"
            exit 1
          fi
          echo "✅ Service account has roles/datastore.indexAdmin — ready to deploy Firestore indexes"

      - name: Deploy Firestore indexes and rules
        run: |
          echo "🔥 Deploying Firestore configuration..."
          firebase deploy --only firestore --project ${{ env.GCP_PROJECT_ID }}
          echo "✅ Firestore deployed successfully"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-firestore]
    if: github.ref == 'refs/heads/main' && !failure() && !cancelled()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(git log --oneline --pretty=format:"- %s" HEAD~10..HEAD)
          else
            NOTES=$(git log --oneline --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes
            ${{ steps.release_notes.outputs.notes }}

            ## Deployments
            - Backend: https://billingonaire-backend-819125105651.asia-south1.run.app
            - Frontend: https://billingonaire.web.app

            ## Deployment Status
            ✅ Backend deployed to Cloud Run
            ✅ Frontend deployed to Firebase Hosting
          draft: false
          prerelease: false
