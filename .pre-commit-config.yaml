repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^billingonaire_backend/.*\.py$
        args: [--settings-path, billingonaire_backend/pyproject.toml]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^billingonaire_backend/.*\.py$
        args: [--config, billingonaire_backend/pyproject.toml]

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        files: ^billingonaire_backend/.*\.py$
        exclude: ^billingonaire_backend/tests/
        args:
          - --config=billingonaire_backend/.flake8
          - --count
          - --select=E9,F63,F7,F82
          - --show-source
          - --statistics

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^billingonaire_backend/.*\.py$
        pass_filenames: false
        args:
          - --config-file
          - billingonaire_backend/mypy.ini
          - billingonaire_backend/CourtScraper.py
        additional_dependencies:
          - types-requests

  - repo: local
    hooks:
      - id: frontend-eslint
        name: Frontend ESLint (src)
        entry: npm --prefix billingonaire-ui run lint -- src --max-warnings=6
        language: system
        pass_filenames: false
        files: ^billingonaire-ui/src/.*\.(js|jsx|ts|tsx)$
