- name: Deploy Billingonaire Application
  hosts: localhost
  tasks:
    - name: Install Node.js
      apt:
        name: nodejs
        state: present
      become: yes

    - name: Install npm
      apt:
        name: npm
        state: present
      become: yes

    - name: Install Python
      apt:
        name: python3
        state: present
      become: yes

    - name: Install pip
      apt:
        name: python3-pip
        state: present
      become: yes

    - name: Install Firebase CLI
      npm:
        name: firebase-tools
        state: present
      become: yes

    - name: Install frontend dependencies
      command: npm install
      args:
        chdir: billingonaire-ui

    - name: Build frontend
      command: npm run build
      args:
        chdir: billingonaire-ui

    - name: Deploy frontend
      command: firebase deploy --only hosting:frontend
      args:
        chdir: billingonaire-ui

    - name: Install backend dependencies
      pip:
        requirements: billingonaire-backend/requirements.txt

    - name: Deploy backend
      command: firebase deploy --only functions:backend
      args:
        chdir: billingonaire-backend
